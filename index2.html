<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aralı Duran İnteraktiv Nöqtələr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="content">
        <h1>Google Antigravity</h1>
        <p>Nöqtələr estetik məsafə ilə izləyir...</p>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        // Nöqtə sayını bir az artırdıq ki, aralı duranda kosmos dumanı effekti versin
        const numberOfParticles = 350; 

        const mouse = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Şəkildəki Google rəng çalarları
        const colors = ['#5154A4', '#D43F6B', '#EEAA44', '#4176CD', '#A13388'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Nöqtələrin ölçülərini bir az fərqli etdik (daha dinamik görünüş üçün)
                this.size = Math.random() * 3.5 + 0.8;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Yumşaq süzülmə sürəti
                this.speedModifier = Math.random() * 0.03 + 0.015; 

                // ƏSAS HİSSƏ: Hər nöqtənin mausa görə fərqli uzaqlıqda durması üçün offset (kənarlaşma)
                // Mausun ətrafında 140 piksellik bir dairə daxilində dağılışırlar
                const randomAngle = Math.random() * Math.PI * 2;
                const randomRadius = Math.random() * 140; 
                
                this.offsetX = Math.cos(randomAngle) * randomRadius;
                this.offsetY = Math.sin(randomAngle) * randomRadius;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                // Nöqtə birbaşa mausa deyil, mausun ətrafındakı öz şəxsi hədəfinə qaçır
                let targetX = mouse.x + this.offsetX;
                let targetY = mouse.y + this.offsetY;

                let dx = targetX - this.x;
                let dy = targetY - this.y;

                // Axıcı hərəkət
                this.x += dx * this.speedModifier;
                this.y += dy * this.speedModifier;
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            // Quyruq effektinin daha zərif görünməsi üçün şəffaflığı 0.1 etdik
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
