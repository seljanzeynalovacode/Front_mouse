<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnteraktiv Nöqtələr Fonu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        /* Kodun üstündə mətnlərin görünməsi üçün */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none; /* Mausun nöqtələrlə əlaqəsini kəsməsin */
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="content">
        <h1>Google Antigravity</h1>
        <p>Uğurla giriş etdiniz.</p>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const numberOfParticles = 150; // Nöqtə sayı

        // Mausun mövqeyini izləmək üçün obyekt
        const mouse = {
            x: null,
            y: null,
            radius: 100 // Mausun təsir etmə dairəsi (piksel)
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Maus ekrandan çıxanda nöqtələr yerinə qayıtsın
        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        // Rəng palitrası (`image_18b301.png`-ə bənzər rənglər)
        const colors = ['#5154A4', '#D43F6B', '#EEAA44', '#4176CD', '#A13388'];

        // Hər bir nöqtənin xüsusiyyətlərini təyin edən Klass
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = this.x; // İlk mövqeyi yadda saxlayır
                this.baseY = this.y;
                this.size = Math.random() * 3 + 1; // Nöqtənin ölçüsü
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.density = (Math.random() * 30) + 1; // Tərpənmə sürəti/ağırlığı
            }

            // Nöqtəni çəkən metod
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            // Mausa görə hərəkəti idarə edən metod
            update() {
                // Maus ilə nöqtə arasındakı məsafəni hesablamaq (Pifaqor teoremi ilə)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    // Əgər maus yaxındadırsa, nöqtəni əks istiqamətə itələ
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;

                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // Maus uzaqlaşanda nöqtə yavaş-yavaş öz ilkin yerinə qayıdır
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }
        }

        // Massivi doldurmaq
        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Animasiya dövrü (Loop)
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].draw();
                particlesArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Ekran ölçüsü dəyişəndə canvas-ı uyğunlaşdır
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
